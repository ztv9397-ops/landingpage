<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Reward Pejuang Kasino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        secondary: '#1E293B',
                        accent: '#2563EB',
                        pending: '#FBBF24',
                        success: '#10B981',
                        danger: '#DC2626',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* 🔒 GLOBAL STYLE UNTUK TABEL - WAJIB KAKU */
        table {
            table-layout: fixed !important;
            width: 100% !important;
        }

        /* Tetapkan ukuran untuk setiap kolom secara PAKSA */
        table th:nth-child(1), table td:nth-child(1) { width: 15% !important; }  /* GAME */
        table th:nth-child(2), table td:nth-child(2) { width: 12% !important; }  /* STATUS */
        table th:nth-child(3), table td:nth-child(3) { width: 25% !important; }  /* DATABASE */
        table th:nth-child(4), table td:nth-child(4) { width: 28% !important; }  /* KETERANGAN */
        table th:nth-child(5), table td:nth-child(5) { width: 20% !important; }  /* REWARD */

        /* Agar isi tidak membesar */
        table th, table td {
            overflow: hidden !important;
            word-wrap: break-word !important;
            word-break: break-all !important; /* Paksa potong kata jika kepanjangan */
            white-space: normal !important;
            vertical-align: top !important;
        }

        /* Style lainnya */
        .nav-link { @apply px-4 py-2 hover:text-blue-500 transition-colors duration-200; }
        .nav-link.active { @apply text-blue-500 border-b-2 border-blue-500; }
        [contenteditable="true"] { @apply cursor-text rounded transition-all duration-150; }
        [contenteditable="true"]:focus { @apply outline-none ring-2 ring-blue-500/50 bg-white; }
        th[contenteditable="true"] { @apply font-semibold; }
        .data-nama { @apply font-bold text-slate-800 block; }
        .data-nomor { @apply text-gray-600 text-sm block mt-1; }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Header / Navbar -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-crown text-blue-500 text-xl mr-2"></i>
                    <span class="text-xl font-bold text-slate-800">PEJUANG KASINO</span>
                </div>
                <nav class="hidden md:flex space-x-2">
                    <a href="#" class="nav-link">Home</a>
                    <a href="#" class="nav-link">Games</a>
                    <a href="#" class="nav-link">Promotions</a>
                    <a href="#" class="nav-link active">Reward Database</a>
                </nav>
                <button class="md:hidden text-gray-700">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-slate-800 mb-4">DATABASE REWARD PEJUANG KASINO</h1>

        <!-- 🔍 SEARCH -->
        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Cari Nomor / Data</label>
            <div class="flex gap-2">
                <input type="text" id="searchInput" onkeyup="cariNomor()" placeholder="Ketik nomor atau kata kunci..." class="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <button onclick="clearSearch()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition-colors">
                    <i class="fa-solid fa-times"></i> Clear
                </button>
            </div>
        </div>

        <!-- INPUT DATA -->
        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Masukan Data (Format: NAMA Nomor)</label>
            <textarea id="inputNomor" rows="6" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Contoh format:
ANDI 081234567890
BUDI 089876543210
CERIA 081111111111"></textarea>
            <button onclick="masukkanNomor()" class="mt-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                <i class="fa-solid fa-paste mr-1"></i> Masukkan ke Database
            </button>
        </div>

        <!-- TABEL -->
        <div class="overflow-x-auto bg-white rounded-lg shadow">
            <table id="dataTable" class="w-full border-collapse">
                <thead>
                    <tr class="bg-gray-100 text-left">
                        <th class="p-4 border-b font-semibold text-gray-700" contenteditable="true">GAME</th>
                        <th class="p-4 border-b font-semibold text-gray-700" contenteditable="true">STATUS</th>
                        <th class="p-4 border-b font-semibold text-gray-700" contenteditable="true">DATABASE</th>
                        <th class="p-4 border-b font-semibold text-gray-700" contenteditable="true">KETERANGAN</th>
                        <th class="p-4 border-b font-semibold text-gray-700" contenteditable="true">REWARD</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Baris akan diisi oleh JS -->
                </tbody>
            </table>
        </div>

        <!-- TOMBOL AKSI -->
        <div class="mt-4 flex flex-wrap gap-3">
            <button onclick="tambahBaris()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                <i class="fa-solid fa-plus mr-2"></i> Tambah Baris
            </button>
            <button onclick="simpanData()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                <i class="fa-solid fa-save mr-2"></i> SAVE DATA
            </button>
            <button onclick="hapusSemua()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                <i class="fa-solid fa-trash mr-2"></i> Hapus Semua Baris
            </button>
        </div>
    </main>

    <script>
        const barisTemplate = `
            <td class="p-4" contenteditable="true">PG/PRAGMATIC</td>
            <td class="p-4">
                <span class="px-3 py-1 rounded-full text-sm font-medium bg-amber-100 text-amber-600" contenteditable="true">PENDING</span>
            </td>
            <td class="p-4">
                <span class="data-nama" contenteditable="true"></span>
                <span class="data-nomor" contenteditable="true"></span>
            </td>
            <td class="p-4">
                <ul class="space-y-1 text-sm text-gray-600">
                    <li class="flex items-center"><i class="fa-solid fa-check text-green-500 mr-2"></i> <span contenteditable="true">telah di undang</span></li>
                    <li class="flex items-center"><i class="fa-solid fa-check text-green-500 mr-2"></i> <span contenteditable="true">sudah di baca</span></li>
                    <li class="flex items-center"><i class="fa-solid fa-check text-green-500 mr-2"></i> <span contenteditable="true">telah membalas</span></li>
                </ul>
            </td>
            <td class="p-4">
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium transition-colors" contenteditable="true">
                    CLAIM NOW
                </button>
            </td>
        `;

        function tambahBaris() {
            var tbody = document.getElementById('tableBody');
            var newRow = tbody.insertRow();
            newRow.className = "border-b hover:bg-gray-50 transition-colors";
            newRow.innerHTML = barisTemplate;
            return newRow;
        }

        function masukkanNomor() {
            let teks = document.getElementById('inputNomor').value;
            let barisTeks = teks.split(/\n/).filter(item => item.trim() != '');

            if(barisTeks.length == 0) {
                alert('Mohon masukkan data terlebih dahulu!');
                return;
            }

            let tbody = document.getElementById('tableBody');
            
            barisTeks.forEach((isi, index) => {
                let bagian = isi.trim().split(/\s+/);
                let nama = bagian.filter(item => !/^\d+$/.test(item)).join(" ");
                let nomor = bagian.find(item => /^\d+$/.test(item)) || "";

                let row = tbody.rows[index] || tambahBaris();
                let spans = row.cells[2].querySelectorAll('span');
                spans[0].textContent = nama;
                spans[1].textContent = nomor;
            });

            alert(`Berhasil memasukkan ${barisTeks.length} data!`);
            document.getElementById('inputNomor').value = '';
        }

        function simpanData() {
            let table = document.getElementById('dataTable');
            let data = [];
            for(let i = 1; i < table.rows.length; i++) {
                let rowData = [];
                for(let j = 0; j < table.rows[i].cells.length; j++) {
                    rowData.push(table.rows[i].cells[j].innerText);
                }
                data.push(rowData);
            }
            localStorage.setItem('dataPejuangKasino', JSON.stringify(data));
            alert('✅ Data BERHASIL disimpan!');
        }

        function hapusSemua() {
            if(confirm("⚠️ Yakin ingin menghapus SEMUA baris?")) {
                document.getElementById('tableBody').innerHTML = "";
            }
        }

        function cariNomor() {
            let input = document.getElementById('searchInput');
            let filter = input.value.toUpperCase();
            let table = document.getElementById('dataTable');
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[2];
                if (td) {
                    let txtValue = td.textContent || td.innerText;
                    tr[i].style.display = (txtValue.toUpperCase().indexOf(filter) > -1) ? "" : "none";
                }       
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            cariNomor();
        }

        function loadData() {
            let savedData = localStorage.getItem('dataPejuangKasino');
            if(savedData) {
                let data = JSON.parse(savedData);
                let tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';

                data.forEach(rowData => {
                    let newRow = tbody.insertRow();
                    newRow.className = "border-b hover:bg-gray-50 transition-colors";
                    newRow.innerHTML = barisTemplate;
                    newRow.cells[0].textContent = rowData[0] || 'PG/PRAGMATIC';
                    newRow.cells[1].textContent = rowData[1] || 'PENDING';
                    
                    let isiDb = rowData[2] || "";
                    let parts = isiDb.split('\n');
                    let spans = newRow.cells[2].querySelectorAll('span');
                    
                    if(parts.length >= 2) {
                        spans[0].textContent = parts[0].trim();
                        spans[1].textContent = parts[1].trim();
                    } else {
                         spans[0].textContent = isiDb.trim();
                    }
                });
            } else {
                for(let i=0; i<3; i++) tambahBaris();
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
