<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Reward Pejuang Kasino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        secondary: '#1E293B',
                        accent: '#2563EB',
                        pending: '#FBBF24',
                        success: '#10B981',
                        danger: '#DC2626',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .nav-link { @apply px-4 py-2 hover:text-accent transition-colors duration-200; }
            .nav-link.active { @apply text-accent border-b-2 border-accent; }
            [contenteditable="true"] { @apply cursor-text rounded transition-all duration-150; }
            [contenteditable="true"]:focus { @apply outline-none ring-2 ring-accent/50 bg-white; }
            th[contenteditable="true"] { @apply font-semibold; }
            .data-nama { @apply font-bold text-primary block; }
            .data-nomor { @apply text-gray-600 text-sm block mt-1; }
            .fixed-table { table-layout: fixed !important; width: 100% !important; }
            .col-game { width: 18%; }
            .col-status { width: 14%; }
            .col-db { width: 24%; }
            .col-desc { width: 24%; }
            .col-reward { width: 20%; }
            td, th { vertical-align: top !important; overflow: hidden !important; word-wrap: break-word !important; }
            .status-badge { background-color: #fef3c7 !important; color: #d97706 !important; border-radius: 9999px !important; padding: 4px 10px !important; font-size: 0.75rem !important; font-weight: 500 !important; display: inline-block !important; }
            
            /* POPUP */
            .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
            .popup-overlay.active { opacity: 1; visibility: visible; }
            .popup-box { background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 12px; padding: 28px; max-width: 380px; width: 90%; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05), 0 10px 15px rgba(0,0,0,0.07); transform: scale(0.95); transition: transform 0.3s ease; }
            .popup-overlay.active .popup-box { transform: scale(1); }
            .popup-icon { width: 60px; height: 60px; margin: 0 auto 20px; background: #FEF2F2; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
            .popup-icon i { color: #DC2626; font-size: 28px; }
            .popup-text { color: #374151; font-size: 15px; line-height: 1.6; margin-bottom: 24px; font-family: inherit; }
            .popup-btn { background: #2563EB; color: white; border: none; padding: 10px 28px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: background 0.2s; font-size: 14px; }
            .popup-btn:hover { background: #1D4ED8; }
            .popup-close { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #9CA3AF; font-size: 22px; cursor: pointer; }

            /* FONT GAME */
            .game-text {
                font-family: 'Arial', sans-serif;
                font-size: 13px;
                font-weight: bold;
                color: #111827;
                line-height: 1.3;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-crown text-accent text-xl mr-2"></i>
                    <span class="text-xl font-bold text-primary">PEJUANG KASINO</span>
                </div>
                <nav class="hidden md:flex space-x-2">
                    <a href="#" class="nav-link">Home</a>
                    <a href="#" class="nav-link">Games</a>
                    <a href="#" class="nav-link">Promotions</a>
                    <a href="#" class="nav-link active">Reward Database</a>
                </nav>
                <button class="md:hidden text-gray-700">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-primary mb-4">DATABASE REWARD PEJUANG KASINO</h1>

        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Cari Nomor / Data</label>
            <div class="flex gap-2">
                <input type="text" id="searchInput" onkeyup="cariNomor()" placeholder="Ketik nomor atau kata kunci..." class="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-transparent">
                <button onclick="clearSearch()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition-colors">
                    <i class="fa-solid fa-times"></i> Clear
                </button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Masukan Data (Format: NAMA Nomor)</label>
            <textarea id="inputNomor" rows="6" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-accent focus:border-transparent" placeholder="Contoh format:
ANDI 081234567890
BUDI 089876543210
CERIA 081111111111"></textarea>
            <button onclick="masukkanNomor()" class="mt-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                <i class="fa-solid fa-paste mr-1"></i> Masukkan ke Database
            </button>
        </div>

        <div class="overflow-x-auto bg-white rounded-lg shadow">
            <table id="dataTable" class="w-full border-collapse fixed-table">
                <thead>
                    <tr class="bg-gray-100 text-left">
                        <th class="p-4 border-b font-semibold text-gray-700 col-game" contenteditable="true">GAME</th>
                        <th class="p-4 border-b font-semibold text-gray-700 col-status" contenteditable="true">STATUS</th>
                        <th class="p-4 border-b font-semibold text-gray-700 col-db" contenteditable="true">DATABASE</th>
                        <th class="p-4 border-b font-semibold text-gray-700 col-desc" contenteditable="true">KETERANGAN</th>
                        <th class="p-4 border-b font-semibold text-gray-700 col-reward" contenteditable="true">REWARD</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="mt-4 flex flex-wrap gap-3">
            <button onclick="tambahBaris()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                <i class="fa-solid fa-plus mr-2"></i> Tambah Baris
            </button>
            <button onclick="simpanData()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                <i class="fa-solid fa-save mr-2"></i> SAVE DATA
            </button>
            <button onclick="hapusSemua()" class="bg-danger hover:bg-red-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                <i class="fa-solid fa-trash mr-2"></i> Hapus Semua Baris
            </button>
        </div>
    </main>

    <div id="popupNotif" class="popup-overlay">
        <div class="popup-box relative">
            <button class="popup-close" onclick="tutupPopup()">&times;</button>
            <div class="popup-icon">
                <i class="fa-solid fa-circle-exclamation"></i>
            </div>
            <div class="popup-text">
                Maaf, reward tidak dapat di claim karena pengguna belum melakukan deposit.
            </div>
            <button class="popup-btn" onclick="tutupPopup()">Tutup</button>
        </div>
    </div>

    <script>
        // Template baris
        const barisTemplate = `
            <td class="p-4 col-game" contenteditable="true">
                <div class="game-text">PG/PRAGMATIC</div>
            </td>
            <td class="p-4 col-status">
                <span class="status-badge" contenteditable="true">PENDING</span>
            </td>
            <td class="p-4 col-db">
                <span class="data-nama" contenteditable="true"></span>
                <span class="data-nomor" contenteditable="true"></span>
            </td>
            <td class="p-4 col-desc">
                <ul class="space-y-1 text-sm text-gray-600">
                    <li class="flex items-center"><i class="fa-solid fa-check text-success mr-2"></i> <span contenteditable="true">telah di undang</span></li>
                    <li class="flex items-center"><i class="fa-solid fa-check text-success mr-2"></i> <span contenteditable="true">sudah di baca</span></li>
                    <li class="flex items-center"><i class="fa-solid fa-check text-success mr-2"></i> <span contenteditable="true">telah membalas</span></li>
                </ul>
            </td>
            <td class="p-4 col-reward">
                <button onclick="bukaPopup()" class="bg-accent hover:bg-accent/90 text-white px-4 py-2 rounded text-sm font-medium transition-colors">
                    CLAIM NOW
                </button>
            </td>
        `;

        // Fungsi Popup
        function bukaPopup() { 
            document.getElementById('popupNotif').classList.add('active'); 
        }
        function tutupPopup() { 
            document.getElementById('popupNotif').classList.remove('active'); 
        }
        document.getElementById('popupNotif').addEventListener('click', function(e) { 
            if(e.target === this) tutupPopup(); 
        });

        // Tambah Baris
        function tambahBaris() {
            var tbody = document.getElementById('tableBody');
            var newRow = tbody.insertRow();
            newRow.className = "border-b hover:bg-gray-50 transition-colors";
            newRow.innerHTML = barisTemplate;
            return newRow;
        }

        // Masukkan Data dari Textarea
        function masukkanNomor() {
            let teks = document.getElementById('inputNomor').value;
            let barisTeks = teks.split(/\n/).filter(item => item.trim() != '');
            let tbody = document.getElementById('tableBody');
            barisTeks.forEach((isi, index) => {
                let bagian = isi.trim().split(/\s+/);
                let nama = bagian.filter(item => !/^\d+$/.test(item)).join(" ");
                let nomor = bagian.find(item => /^\d+$/.test(item)) || "";
                let row = tbody.rows[index] || tambahBaris();
                let spans = row.cells[2].querySelectorAll('span');
                spans[0].textContent = nama;
                spans[1].textContent = nomor;
            });
            alert(`Berhasil memasukkan ${barisTeks.length} data!`);
            document.getElementById('inputNomor').value = '';
        }

        // Simpan Data ke LocalStorage
        function simpanData() {
            let table = document.getElementById('dataTable');
            let data = [];
            for(let i = 1; i < table.rows.length; i++) {
                let row = table.rows[i];
                let objData = {
                    game: row.cells[0].textContent.trim(),
                    status: row.cells[1].textContent.trim(),
                    nama: row.cells[2].querySelector('.data-nama').textContent.trim(),
                    nomor: row.cells[2].querySelector('.data-nomor').textContent.trim(),
                    keterangan: Array.from(row.cells[3].querySelectorAll('span')).map(s => s.textContent.trim()).join('|'),
                    reward: row.cells[4].textContent.trim()
                };
                data.push(objData);
            }
            localStorage.setItem('dataPejuangKasino', JSON.stringify(data));
            alert('✅ Data BERHASIL disimpan!');
        }

        // Hapus Semua Baris
        function hapusSemua() { 
            if(confirm("⚠️ Yakin ingin menghapus SEMUA baris?")) {
                document.getElementById('tableBody').innerHTML = "";
            }
        }

        // Cari Data
        function cariNomor() {
            let input = document.getElementById('searchInput');
            let filter = input.value.toUpperCase();
            let table = document.getElementById('dataTable');
            let tr = table.getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[2];
                if (td) {
                    let txtValue = td.textContent || td.innerText;
                    if (txtValue.toUpperCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }       
            }
        }
        function clearSearch() { 
            document.getElementById('searchInput').value = ''; 
            cariNomor(); 
        }

        // Load Data saat halaman dibuka
        function loadData() {
            let savedData = localStorage.getItem('dataPejuangKasino');
            if(savedData) {
                let data
