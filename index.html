<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Database Jackpot Pejuang Kasino</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

/* ===== BODY ===== */
body{
background:#f5f7fa;
color:#1f2937;
}

/* ===== HEADER ===== */
.header{
background:#ffffff;
position: fixed;
top: 0;
left: 0;
width: 100%;
padding: 14px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #e5e7eb;
z-index:1000;
}
.logo{font-size:20px;font-weight:700;color:#111827;}
.nav a{color:#374151;text-decoration:none;font-size:13px;margin-left:20px;}
.nav a:hover{color:#000;}

/* ===== CONTAINER ===== */
.container{
padding:100px 20px 40px;
}
.title{
font-size:22px;
font-weight:700;
margin-bottom:20px;
color:#111827;
}

/* ===== TABLE ===== */
.table-wrapper{
background:#ffffff;
padding:20px;
border-radius:8px;
border:1px solid #e5e7eb;
overflow-x:auto;
}

table{
width:100%;
min-width:700px;
border-collapse:collapse;
border:1px solid #e5e7eb;
}

thead{
background:#f9fafb;
}
thead th{
padding:14px;
font-size:13px;
color:#374151;
border-bottom:1px solid #e5e7eb;
}

tbody td{
padding:14px;
font-size:13px;
border-bottom:1px solid #e5e7eb;
color:#111827;
}

tbody tr:hover{
background:#f3f4f6;
}

/* ===== DATABASE ===== */
.db-name{font-weight:600;}
.db-number{
color:#2563eb;
cursor:pointer;
}

/* ===== BADGE ===== */
.badge{
display:inline-block;
padding:5px 10px;
border-radius:6px;
font-size:11px;
font-weight:600;
}

.claim-now{background:#2563eb;color:white;}
.claimed{background:#10b981;color:white;}
.not-taken{background:#ef4444;color:white;}

/* ===== BUTTON ===== */
.button-wrapper{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:8px 14px;
font-size:12px;
border-radius:6px;
border:1px solid #d1d5db;
cursor:pointer;
}

#addRow{background:#2563eb;color:white;}
#saveTable{background:#10b981;color:white;}
#deleteRow{background:#f59e0b;color:white;}
#deleteAll{background:#ef4444;color:white;}

/* ===== POPUP ===== */
#customPopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.5);
}

#customPopup.show{display:flex;}

.popupBox{
background:#ffffff;
padding:25px;
border-radius:8px;
border:1px solid #e5e7eb;
text-align:center;
}

.popupBtn{
margin-top:15px;
padding:8px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* ===== INPUT MULTI ===== */
#webInputOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
}

#webInputOverlay.show{display:flex;}

#webInputOverlay textarea{
width:300px;
height:120px;
border-radius:6px;
border:1px solid #d1d5db;
padding:8px;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">PEJUANG KASINO</div>
<div class="nav">
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">Promotions</a>
<a href="#">Jackpot</a>
</div>
</div>

<div class="container">
<div class="title" contenteditable="true">DATABASE JACKPOT</div>

<div class="table-wrapper">
<table id="jackpotTable">
<thead>
<tr>
<th>GAME</th>
<th>STATUS</th>
<th>DATABASE</th>
<th>KETERANGAN</th>
<th>JACKPOT</th>
</tr>
</thead>

<tbody>
<tr>
<td contenteditable="true">PG</td>
<td contenteditable="true">PENDING</td>
<td>
<div class="db-name" contenteditable="true">Nama</div>
<div class="db-number" onclick="window.open('https://wa.me/-')">-</div>
</td>
<td>VIP</td>
<td><span class="badge claim-now">CLAIM NOW</span></td>
</tr>
</tbody>
</table>

<div class="button-wrapper">
<button id="addRow">Tambah</button>
<button id="deleteRow">Hapus</button>
<button id="deleteAll">Hapus Semua</button>
<button id="saveTable">Save</button>
</div>

</div>
</div>

<!-- POPUP -->
<div id="customPopup">
<div class="popupBox">
<div>Maaf belum deposit</div>
<button class="popupBtn" id="popupCloseBtn">Tutup</button>
</div>
</div>

<script>
const table = document.getElementById("jackpotTable");
const popup = document.getElementById("customPopup");

function setupBadge(){
document.querySelectorAll(".badge").forEach(b=>{
b.onclick=()=>{
if(b.innerText==="CLAIM NOW"){
popup.classList.add("show");
}else if(b.innerText==="CLAIMED"){
b.innerText="NOT TAKEN";
b.className="badge not-taken";
}else{
b.innerText="CLAIM NOW";
b.className="badge claim-now";
}
};
});
}

document.getElementById("popupCloseBtn").onclick=()=>{
popup.classList.remove("show");
document.querySelectorAll(".badge").forEach(b=>{
if(b.innerText==="CLAIM NOW"){
b.innerText="CLAIMED";
b.className="badge claimed";
}
});
};

document.getElementById("addRow").onclick=()=>{
let row = table.insertRow();
row.innerHTML=`
<td contenteditable="true">PG</td>
<td contenteditable="true">PENDING</td>
<td><div class="db-name">Nama</div><div class="db-number">-</div></td>
<td>VIP</td>
<td><span class="badge claim-now">CLAIM NOW</span></td>`;
setupBadge();
};

document.getElementById("deleteRow").onclick=()=>{
if(table.rows.length>1) table.deleteRow(-1);
};

document.getElementById("deleteAll").onclick=()=>{
table.querySelector("tbody").innerHTML="";
};

document.getElementById("saveTable").onclick=()=>{
localStorage.setItem("data", table.innerHTML);
alert("Saved");
};

window.onload=()=>{
let data = localStorage.getItem("data");
if(data) table.innerHTML=data;
setupBadge();
};
</script>

</body>
</html>
