<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Jackpot Pejuang Kasino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        secondary: '#1E293B',
                        accent: '#2563EB',
                        success: '#10B981',
                        danger: '#DC2626',
                        darkbg: '#0F172A',
                        cardbg: '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .nav-link { @apply px-4 py-2 hover:text-accent transition-colors duration-200; }
            .nav-link.active { @apply text-accent border-b-2 border-accent; }
            [contenteditable="true"] { @apply cursor-text rounded transition-all duration-150; }
            [contenteditable="true"]:focus { @apply outline-none ring-2 ring-accent/50 bg-white; }
            th[contenteditable="true"] { @apply font-semibold; }
            .data-nama { @apply font-bold text-white block; }
            .data-nomor { @apply text-gray-400 text-sm block mt-1; }

            /* Kunci tabel */
            .table-kaku { table-layout: fixed !important; width: 100% !important; }
            .kolom-1 { width: 18%; }
            .kolom-2 { width: 14%; }
            .kolom-3 { width: 24%; }
            .kolom-4 { width: 24%; }
            .kolom-5 { width: 20%; }
            td, th { vertical-align: top !important; overflow: hidden !important; color: #fff;}

            /* Style PENDING */
            .status-badge {
                background-color: #fef3c7 !important;
                color: #d97706 !important;
                border-radius: 999px !important;
                padding: 4px 10px !important;
                font-size: 12px !important;
                font-weight: 500 !important;
                display: inline-block !important;
            }

            /* Style Popup */
            .popup-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.7);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.3s ease, visibility 0.3s ease;
            }
            .popup-overlay.active {
                opacity: 1;
                visibility: visible;
            }
            .popup-box {
                background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
                border: 1px solid #334155;
                border-radius: 12px;
                padding: 24px;
                max-width: 350px;
                width: 90%;
                text-align: center;
                box-shadow: 0 10px 25px rgba(0,0,0,0.3);
                transform: scale(0.9);
                transition: transform 0.3s ease;
            }
            .popup-overlay.active .popup-box {
                transform: scale(1);
            }
            .popup-icon {
                width: 50px;
                height: 50px;
                margin: 0 auto 16px;
                background: rgba(220, 38, 38, 0.1);
                border-radius: 50%;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .popup-icon i {
                color: #EF4444;
                font-size: 24px;
            }
            .popup-text {
                color: #E2E8F0;
                font-size: 14px;
                line-height: 1.6;
                margin-bottom: 20px;
            }
            .popup-btn {
                background: #2563EB;
                color: white;
                border: none;
                padding: 10px 24px;
                border-radius: 8px;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.2s;
            }
            .popup-btn:hover {
                background: #1D4ED8;
            }
            .popup-close {
                position: absolute;
                top: 15px;
                right: 20px;
                background: none;
                border: none;
                color: #94A3B8;
                font-size: 20px;
                cursor: pointer;
            }
        }
    </style>
</head>
<body class="bg-darkbg font-sans">
    <!-- Header / Navbar -->
    <header class="bg-cardbg shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-crown text-accent text-xl mr-2"></i>
                    <span class="text-xl font-bold text-white">PEJUANG KASINO</span>
                </div>
                <nav class="hidden md:flex space-x-2">
                    <a href="#" class="nav-link text-gray-300">Home</a>
                    <a href="#" class="nav-link text-gray-300">Games</a>
                    <a href="#" class="nav-link text-gray-300">Promotions</a>
                    <a href="#" class="nav-link active text-accent">Jackpot Database</a>
                </nav>
                <button class="md:hidden text-gray-300">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-white mb-4">DATABASE JACKPOT PEJUANG KASINO</h1>

        <!-- 🔍 SEARCH -->
        <div class="bg-cardbg p-4 rounded-lg shadow mb-6">
            <label class="block text-sm font-medium text-gray-300 mb-2">Cari Nomor / Data</label>
            <div class="flex gap-2">
                <input type="text" id="searchInput" onkeyup="cariNomor()" placeholder="Ketik nomor atau kata kunci..." class="flex-1 p-3 border border-gray-600 bg-darkbg text-white rounded-lg focus:ring-2 focus:ring-accent focus:border-transparent">
                <button onclick="clearSearch()" class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-2 rounded-lg transition-colors">
                    <i class="fa-solid fa-times"></i> Clear
                </button>
            </div>
        </div>

        <!-- INPUT DATA -->
        <div class="bg-cardbg p-4 rounded-lg shadow mb-6">
            <label class="block text-sm font-medium text-gray-300 mb-2">Masukan Data (Format: NAMA Nomor)</label>
            <textarea id="inputNomor" rows="6" class="w-full p-3 border border-gray-600 bg-darkbg text-white rounded-lg focus:ring-2 focus:ring-accent focus:border-transparent" placeholder="Contoh format:
ANDI 081234567890
BUDI 089876543210
CERIA 081111111111"></textarea>
            <button onclick="masukkanNomor()" class="mt-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                <i class="fa-solid fa-paste mr-1"></i> Masukkan ke Database
            </button>
        </div>

        <!-- TABEL -->
        <div class="overflow-x-auto bg-cardbg rounded-lg shadow">
            <table id="dataTable" class="w-full border-collapse table-kaku">
                <thead>
                    <tr class="bg-gray-800 text-left">
                        <th class="p-4 border-b border-gray-700 font-semibold text-gray-300 kolom-1" contenteditable="true">GAME</th>
                        <th class="p-4 border-b border-gray-700 font-semibold text-gray-300 kolom-2" contenteditable="true">STATUS</th>
                        <th class="p-4 border-b border-gray-700 font-semibold text-gray-300 kolom-3" contenteditable="true">DATABASE</th>
                        <th class="p-4 border-b border-gray-700 font-semibold text-gray-300 kolom-4" contenteditable="true">KETERANGAN</th>
                        <th class="p-4 border-b border-gray-700 font-semibold text-gray-300 kolom-5" contenteditable="true">JACKPOT</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <!-- TOMBOL AKSI -->
        <div class="mt-4 flex flex-wrap gap-3">
            <button onclick="tambahBaris()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                <i class="fa-solid fa-plus mr-2"></i> Tambah Baris
            </button>
            <button onclick="simpanData()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                <i class="fa-solid fa-save mr-2"></i> SAVE DATA
            </button>
            <button onclick="hapusSemua()" class="bg-danger hover:bg-red-700 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center">
                <i class="fa-solid fa-trash mr-2"></i> Hapus Semua Baris
            </button>
        </div>
    </main>

    <!-- 👇 POPUP NOTIFIKASI 👇 -->
    <div id="popupNotif" class="popup-overlay">
        <div class="popup-box relative">
            <button class="popup-close" onclick="tutupPopup()">&times;</button>
            <div class="popup-icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <div class="popup-text">
                Maaf jackpot tidak dapat di claim karena pengguna belum melakukan deposit.
            </div>
            <button class="popup-btn" onclick="tutupPopup()">Tutup</button>
        </div>
    </div>

    <script>
        // Template Baris dengan Tombol Claim yang punya fungsi klik
        const barisTemplate = `
            <td class="p-4 kolom-1 border-b border-gray-700" contenteditable="true">PG/PRAGMATIC</td>
            <td class="p-4 kolom-2 border-b border-gray-700">
                <span class="status-badge" contenteditable="true">PENDING</span>
            </td>
            <td class="p-4 kolom-3 border-b border-gray-700">
                <span class="data-nama" contenteditable="true"></span>
                <span class="data-nomor" contenteditable="true"></span>
            </td>
            <td class="p-4 kolom-4 border-b border-gray-700">
                <ul class="space-y-1 text-sm text-gray-400">
                    <li class="flex items-center"><i class="fa-solid fa-check text-success mr-2"></i> <span contenteditable="true">telah di undang</span></li>
                    <li class="flex items-center"><i class="fa-solid fa-check text-success mr-2"></i> <span contenteditable="true">sudah di baca</span></li>

                </ul>
            </td>
            <td class="p-4 kolom-5 border-b border-gray-700">
                <!-- ✅ Tombol Claim dengan fungsi onclick -->
                <button onclick="bukaPopup()" class="bg-accent hover:bg-accent/90 text-white px-4 py-2 rounded text-sm font-medium transition-colors" contenteditable="true">
                    CLAIM NOW
                </button>
            </td>
        `;

        // Fungsi Popup
        function bukaPopup() {
            document.getElementById('popupNotif').classList.add('active');
        }

        function tutupPopup() {
            document.getElementById('popupNotif').classList.remove('active');
        }

        // Tutup popup kalau klik di luar area kotak
        document.getElementById('popupNotif').addEventListener('click', function(e) {
            if (e.target === this) {
                tutupPopup();
            }
        });

        function tambahBaris() {
            var tbody = document.getElementById('tableBody');
            var newRow = tbody.insertRow();
            newRow.className = "hover:bg-gray-800/50 transition-colors";
            newRow.innerHTML = barisTemplate;
            return newRow;
        }

        function masukkanNomor() {
            let teks = document.getElementById('inputNomor').value;
            let barisTeks = teks.split(/\n/).filter(item => item.trim() != '');
            let tbody = document.getElementById('tableBody');
            barisTeks.forEach((isi, index) => {
                let bagian = isi.trim().split(/\s+/);
                let nama = bagian.filter(item => !/^\d+$/.test(item)).join(" ");
                let nomor = bagian.find(item => /^\d+$/.test(item)) || "";
                let row = tbody.rows[index] || tambahBaris();
                let spans = row.cells[2].querySelectorAll('span');
                spans[0].textContent = nama;
                spans[1].textContent = nomor;
            });
            alert(`Berhasil memasukkan ${barisTeks.length} data!`);
            document.getElementById('inputNomor').value = '';
        }

        function simpanData() {
            let table = document.getElementById('dataTable');
            let data = [];
            for(let i = 1; i < table.rows.length; i++) {
                let rowData = [];
                for(let j = 0; j < table.rows[i].cells.length; j++) { rowData.push(table.rows[i].cells[j].innerText); }
                data.push(rowData);
            }
            localStorage.setItem('dataPejuangKasinoBaru', JSON.stringify(data));
            alert('✅ Data BERHASIL disimpan!');
        }
